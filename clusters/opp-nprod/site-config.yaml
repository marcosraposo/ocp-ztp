apiVersion: siteconfig.open-cluster-management.io/v1alpha1
kind: ClusterInstance
metadata:
  name: "opp-nprod-standalone"
  namespace: "opp-nprod"
  annotations:
    ztp-deploy: "true"
spec:
  clusterName: "nprod"
  baseDomain: "malima.rhbr-lab.com"
  pullSecretRef:
    name: "assisted-installer-pull-secret"
  clusterImageSetNameRef: "img4.20.0-x86-64-appsub"
  networkType: "OVNKubernetes"
  
  # Templates obrigatórios para o ZTP v2 (MCE/ACM)
  templateRefs:
    - name: "assisted-installer-template"
      kind: "ConfigMap"
      namespace: "multicluster-engine"
    - name: "agent-cluster-install-template"
      kind: "ConfigMap"
      namespace: "multicluster-engine"

  clusterLabels:
    cloud: "OpenShiftVirt"
    vendor: "OpenShift"
    env: "nprod"

  nodes:
    # --- MASTER 0 ---
    - hostName: "master01.nprod.malima.rhbr-lab.com"
      role: "master"
      templateRefs:
        - name: "bmh-template"
          kind: "ConfigMap"
          namespace: "multicluster-engine"
      bmcAddress: "virt-it+https://api.malima.rhbr-lab.com:6443" 
      bmcCredentialsName:
        name: "bmc-secret-standalone"
      bootMACAddress: "02:00:00:00:00:01" 
      nodeNetwork:
        interfaces:
          - name: eth0
            macAddress: "02:00:00:00:00:01"
        config:
          interfaces:
            - name: eth0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                address:
                  - ip: 10.36.41.82
                    prefix-length: 16
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 10.36.64.243
                next-hop-interface: eth0
          dns-resolver:
            config:
              server:
                - 10.36.41.51 

    # --- MASTER 1 ---
    - hostName: "master02.nprod.malima.rhbr-lab.com"
      role: "master"
      templateRefs:
        - name: "bmh-template"
          kind: "ConfigMap"
          namespace: "multicluster-engine"
      bmcAddress: "virt-it+https://api.malima.rhbr-lab.com:6443" 
      bmcCredentialsName:
        name: "bmc-secret-standalone"
      bootMACAddress: "02:00:00:00:00:02" 
      nodeNetwork:
        interfaces:
          - name: eth0
            macAddress: "02:00:00:00:00:02"
        config:
          interfaces:
            - name: eth0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                address:
                  - ip: 10.36.41.83
                    prefix-length: 16
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 10.36.64.243
                next-hop-interface: eth0
          dns-resolver:
            config:
              server:
                - 10.36.41.51                       

    # --- MASTER 1 ---
    - hostName: "master03.nprod.malima.rhbr-lab.com"
      role: "master"
      templateRefs:
        - name: "bmh-template"
          kind: "ConfigMap"
          namespace: "multicluster-engine"
      bmcAddress: "virt-it+https://api.malima.rhbr-lab.com:6443" 
      bmcCredentialsName:
        name: "bmc-secret-standalone"
      bootMACAddress: "02:00:00:00:00:02" 
      nodeNetwork:
        interfaces:
          - name: eth0
            macAddress: "02:00:00:00:00:02"
        config:
          interfaces:
            - name: eth0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                address:
                  - ip: 10.36.41.84
                    prefix-length: 16
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 10.36.64.243
                next-hop-interface: eth0
          dns-resolver:
            config:
              server:
                - 10.36.41.51                       


    # --- MASTER