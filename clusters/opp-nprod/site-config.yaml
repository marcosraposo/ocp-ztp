apiVersion: siteconfig.open-cluster-management.io/v1alpha1
kind: ClusterInstance
metadata:
  name: "lab-virt-standalone"
  namespace: "opp-nprod"
  annotations:
    # Esta anotação ajuda o TALM a identificar o processo
    ztp-deploy: "true"
spec:
  pullSecretRef:
    name: "assisted-installer-pull-secret"
  clusterImageSetNameRef: "img4.20.0-x86-64-appsub"
  clusterName: "standalone-cluster"
  baseDomain: "rhbr-lab.com"
  networkType: "OVNKubernetes"
  clusterLabels:
    cloud: "OpenShiftVirt"
    vendor: "OpenShift"
  nodes:
    - hostName: "master-0.standalone.com"
      role: "master"
      bmcAddress: "virt-it+https://api.malima.rhbr-lab.com:6443" 
      bmcCredentialsName:
        name: "bmc-secret-standalone"
      bootMACAddress: "02:00:00:00:00:01" 
      nodeNetwork:
        interfaces:
          - name: eth0
            macAddress: "02:00:00:00:00:01"
        config:
          interfaces:
            - name: eth0
              type: ethernet
              state: up
              ipv4:
                enabled: true
                address:
                  - ip: 10.36.41.82
                    prefix-length: 16
          routes:
            config:
              - destination: 0.0.0.0/0
                next-hop-address: 10.36.64.243
                next-hop-interface: eth0
          dns-resolver:
            config:
              server:
                - 10.36.41.51 
    # Replicar para master-1 e master-2 (IDs 02 e 03) conforme os exemplos anteriores...
  installConfigOverrides: |
    {
      "controlPlane": { "replicas": 3 },
      "compute": [ { "replicas": 0 } ]
    }